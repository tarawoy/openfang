name: OpenWrt Build

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  OPENWRT_TARGET: aarch64-unknown-linux-musl

jobs:
  cli:
    name: Build / OpenWrt ARM64
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ env.OPENWRT_TARGET }}

      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y perl make pkg-config

      - name: Install zig
        uses: mlugg/setup-zig@v2
        with:
          version: latest

      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild --locked

      - uses: Swatinem/rust-cache@v2
        with:
          key: openwrt-${{ env.OPENWRT_TARGET }}

      - name: Build CLI for OpenWrt
        env:
          OPENSSL_STATIC: 1
          OPENSSL_NO_PKG_CONFIG: 1
          OPENSSL_VENDORED: 1
        run: cargo zigbuild --release --target ${{ env.OPENWRT_TARGET }} --bin openfang

      - name: Package artifact
        run: |
          cd target/${{ env.OPENWRT_TARGET }}/release
          tar czf ../../../openfang-openwrt-arm64.tar.gz openfang
          cd ../../..
          sha256sum openfang-openwrt-arm64.tar.gz > openfang-openwrt-arm64.tar.gz.sha256

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openfang-openwrt-arm64
          path: |
            openfang-openwrt-arm64.tar.gz
            openfang-openwrt-arm64.tar.gz.sha256
          if-no-files-found: error
